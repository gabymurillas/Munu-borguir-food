<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Panel de Precios</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <link rel="stylesheet" href="../css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
    <div class="admin-nav">
        <div class="nav-top">
            <h1>BORGUIR <span style="color:var(--primary)">MANAGER</span></h1>
            <a href="../index.html" class="btn-menu-link">
                <i class="ph ph-storefront"></i> <span>Ver Menú</span>
            </a>
        </div>
        <div class="nav-search">
            <input type="text" id="admin-search" placeholder="🔍 Buscar producto..." class="search-input">
        </div>
    </div>

    <div class="admin-container">
        <div class="stats-container">
            <div class="stat-card">
                <h4>Categorías</h4>
                <div class="value" id="stat-categories">-</div>
            </div>
            <div class="stat-card">
                <h4>Productos</h4>
                <div class="value" id="stat-products">-</div>
            </div>
            <div class="stat-card">
                <h4>Actualizaciones</h4>
                <div class="value" id="stat-updates">Live</div>
            </div>
        </div>

        <div id="category-filters" class="filter-chips">
            <!-- Chips de categorías -->
        </div>

        <div id="admin-content">
            <p style="text-align: center; padding: 50px; opacity: 0.5;">Iniciando panel de gestión...</p>
        </div>
    </div>

    <button class="fab" style="bottom: 110px; background: var(--surface); color: var(--primary);"
        onclick="showCategoryModal()" title="Añadir Categoría">📂</button>
    <button class="fab" onclick="showAddModal()" title="Añadir Producto">+</button>

    <div id="add-category-modal" class="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2 style="font-family: 'Bebas Neue', cursive; font-size: 2.2rem; margin: 0; color: var(--primary);">
                    NUEVA CATEGORÍA</h2>
                <span class="close-modal" onclick="hideCategoryModal()">&times;</span>
            </div>
            <form id="add-category-form">
                <div class="form-group">
                    <label>Nombre de Categoría (Usa emoji al inicio indicando su icono)</label>
                    <input type="text" id="new-cat-name" required placeholder="Ej: 🍟 Ración de Papas">
                </div>
                <div class="form-group">
                    <label>Slug (identificador único sin espacios o tildes)</label>
                    <input type="text" id="new-cat-slug" required placeholder="Ej: racion-papas">
                </div>
                <button type="submit" class="btn-primary"
                    style="width: 100%; justify-content: center; margin-top: 1rem;">Guardar Categoría</button>
            </form>
        </div>
    </div>

    <div id="add-modal" class="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2 style="font-family: 'Bebas Neue', cursive; font-size: 2.2rem; margin: 0; color: var(--primary);">
                    NUEVO PRODUCTO</h2>
                <button onclick="window.hideAddModal()"
                    style="background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; opacity: 0.5;">&times;</button>
            </div>

            <form id="add-product-form">
                <div class="form-group">
                    <label>Nombre del Producto</label>
                    <input type="text" id="new-name" required placeholder="Ej: Hamburguesa VIP">
                </div>
                <div class="form-group">
                    <label>Categoría</label>
                    <select id="new-category" required></select>
                </div>
                <div class="form-group">
                    <label>Descripción / Ingredientes</label>
                    <textarea id="new-desc" rows="3" placeholder="Describe los ingredientes..."></textarea>
                </div>
                <div class="form-group">
                    <label>Precio de Venta ($)</label>
                    <input type="number" step="0.01" id="new-price" required placeholder="0.00">
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2.5rem;">
                    <button type="button" class="btn-cancel" onclick="window.hideAddModal()" style="flex:1">
                        <i class="ph ph-x-circle"></i> Cancelar
                    </button>
                    <button type="submit" class="btn-primary" style="flex:1">
                        <i class="ph ph-check-circle"></i> Crear Producto
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="../js/admin/main.js"></script>
</body>

</html>
